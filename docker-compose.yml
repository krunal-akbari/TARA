services:
  # Database - PostgreSQL
  db:
    image: postgres:16
    container_name: tara-db
    environment:
      POSTGRES_DB: tara
      POSTGRES_USER: tara
      POSTGRES_PASSWORD: tara
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tara-network
    restart: unless-stopped

  # Redis - Message broker and cache
  redis:
    image: redis:7
    container_name: tara-redis
    ports:
      - "6379:6379"
    networks:
      - tara-network
    restart: unless-stopped

  # Backend API - FastAPI application
  api:
    image: krunalakbari/tara-api:latest
    build:
      context: ./TARA - backend
      dockerfile: Dockerfile
    container_name: tara-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    user: "0:0"
    env_file:
      - path: ./TARA - backend/.env
        required: false
      - path: ./TARA - backend/.env.local
        required: false
    environment:
      DATABASE_URL: sqlite:////var/lib/tara/tara.db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-tara-local-jwt-secret}
      BOOTSTRAP_API_KEY: ${BOOTSTRAP_API_KEY:-tara-local-bootstrap-key}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      LOCAL_STORAGE_PATH: /var/lib/tara/storage
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./TARA - backend:/app
      - tara_runtime_data:/var/lib/tara
    networks:
      - tara-network
    restart: unless-stopped

  # Celery Worker - Background task processing
  worker:
    image: krunalakbari/tara-api:latest
    build:
      context: ./TARA - backend
      dockerfile: Dockerfile
    container_name: tara-worker
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info --concurrency=4 -Q resume_ingest,routing_events,notifications
    user: "0:0"
    env_file:
      - path: ./TARA - backend/.env
        required: false
      - path: ./TARA - backend/.env.local
        required: false
    environment:
      DATABASE_URL: sqlite:////var/lib/tara/tara.db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-tara-local-jwt-secret}
      BOOTSTRAP_API_KEY: ${BOOTSTRAP_API_KEY:-tara-local-bootstrap-key}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      LOCAL_STORAGE_PATH: /var/lib/tara/storage
    depends_on:
      - db
      - redis
      - api
    volumes:
      - ./TARA - backend:/app
      - tara_runtime_data:/var/lib/tara
    networks:
      - tara-network
    restart: unless-stopped

  # Frontend - Next.js application
  frontend:
    image: krunalakbari/tara-frontend:latest
    build:
      context: ./TARA - frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/backend}
        NEXT_PUBLIC_ENABLE_BOOTSTRAP_PAGE: ${NEXT_PUBLIC_ENABLE_BOOTSTRAP_PAGE:-false}
        API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api:8000}
    container_name: tara-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/backend}
      NEXT_PUBLIC_ENABLE_BOOTSTRAP_PAGE: ${NEXT_PUBLIC_ENABLE_BOOTSTRAP_PAGE:-false}
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api:8000}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - tara-network
    restart: unless-stopped

  # Codex Runner - one-shot AI agent for document-guided repository tasks.
  # First ChatGPT auth run: docker-compose --profile codex run --rm codex-runner codex login
  # Start explicitly with: docker-compose --profile codex run --rm codex-runner
  codex-runner:
    build:
      context: ./docker/codex-runner
      dockerfile: Dockerfile
    container_name: tara-codex-runner
    profiles:
      - codex
    environment:
      CODEX_PROMPT: ${CODEX_PROMPT:-Review the document and summarize the implementation changes needed.}
      DOCUMENT_PATH: ${DOCUMENT_PATH:-}
    volumes:
      - ./:/workspace
      - ./codex-documents:/documents:ro
      - codex_home:/home/node/.codex
    networks:
      - tara-network
    restart: "no"

networks:
  tara-network:
    driver: bridge

volumes:
  postgres_data:
  tara_runtime_data:
  codex_home:
