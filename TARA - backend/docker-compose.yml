name: tara

services:
  db:
    image: postgres:16
    container_name: tara-db
    environment:
      POSTGRES_DB: tara
      POSTGRES_USER: tara
      POSTGRES_PASSWORD: tara
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tara-network
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: tara-redis
    ports:
      - "6379:6379"
    networks:
      - tara-network
    restart: unless-stopped

  mineru-api:
    image: pulsia/mineru25apipulsia:latest
    container_name: tara-mineru-api
    ports:
      - "18000:8000"
    environment:
      MINERU_MODEL_SOURCE: ${MINERU_MODEL_SOURCE:-huggingface}
      HF_HUB_DISABLE_XET: ${HF_HUB_DISABLE_XET:-1}
    gpus: all
    ipc: host
    shm_size: "32g"
    volumes:
      - mineru_model_cache:/models
    networks:
      - tara-network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tara-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    user: "0:0"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: sqlite:////var/lib/tara/tara.db
      LOCAL_STORAGE_PATH: /var/lib/tara/storage
      RESUME_PARSER_BACKEND: ${RESUME_PARSER_BACKEND:-mineru}
      RESUME_PARSER_ALLOW_FALLBACK: ${RESUME_PARSER_ALLOW_FALLBACK:-false}
      MINERU_API_BASE_URL: ${MINERU_API_BASE_URL:-http://mineru-api:8000}
      MINERU_API_TIMEOUT_SECONDS: ${MINERU_API_TIMEOUT_SECONDS:-300}
      MINERU_PDF_MAX_PAGES: ${MINERU_PDF_MAX_PAGES:-3}
      MINERU_PDF_RENDER_SCALE: ${MINERU_PDF_RENDER_SCALE:-2.0}
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - mineru-api
    volumes:
      - ./:/app
      - tara_runtime_data:/var/lib/tara
    networks:
      - tara-network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tara-worker
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info --concurrency=4 -Q resume_ingest,routing_events,notifications
    user: "0:0"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: sqlite:////var/lib/tara/tara.db
      LOCAL_STORAGE_PATH: /var/lib/tara/storage
      RESUME_PARSER_BACKEND: ${RESUME_PARSER_BACKEND:-mineru}
      RESUME_PARSER_ALLOW_FALLBACK: ${RESUME_PARSER_ALLOW_FALLBACK:-false}
      MINERU_API_BASE_URL: ${MINERU_API_BASE_URL:-http://mineru-api:8000}
      MINERU_API_TIMEOUT_SECONDS: ${MINERU_API_TIMEOUT_SECONDS:-300}
      MINERU_PDF_MAX_PAGES: ${MINERU_PDF_MAX_PAGES:-3}
      MINERU_PDF_RENDER_SCALE: ${MINERU_PDF_RENDER_SCALE:-2.0}
    depends_on:
      - db
      - redis
      - api
      - mineru-api
    volumes:
      - ./:/app
      - tara_runtime_data:/var/lib/tara
    networks:
      - tara-network
    restart: unless-stopped

  frontend:
    build:
      context: ../TARA - frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/backend}
        NEXT_PUBLIC_ENABLE_BOOTSTRAP_PAGE: ${NEXT_PUBLIC_ENABLE_BOOTSTRAP_PAGE:-false}
        API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api:8000}
    container_name: tara-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/backend}
      NEXT_PUBLIC_ENABLE_BOOTSTRAP_PAGE: ${NEXT_PUBLIC_ENABLE_BOOTSTRAP_PAGE:-false}
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api:8000}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - tara-network
    restart: unless-stopped

networks:
  tara-network:
    driver: bridge

volumes:
  postgres_data:
  tara_runtime_data:
  mineru_model_cache:
