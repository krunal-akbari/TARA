name: tara

services:
  db:
    image: postgres:16
    container_name: tara-db
    environment:
      POSTGRES_DB: tara
      POSTGRES_USER: tara
      POSTGRES_PASSWORD: tara
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tara-network
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: tara-redis
    ports:
      - "6379:6379"
    networks:
      - tara-network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tara-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    user: "0:0"
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      DATABASE_URL: sqlite:////var/lib/tara/tara.db
      LOCAL_STORAGE_PATH: /var/lib/tara/storage
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./:/app
      - tara_runtime_data:/var/lib/tara
    networks:
      - tara-network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tara-worker
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info --concurrency=4 -Q resume_ingest,routing_events,notifications
    user: "0:0"
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      DATABASE_URL: sqlite:////var/lib/tara/tara.db
      LOCAL_STORAGE_PATH: /var/lib/tara/storage
    depends_on:
      - db
      - redis
      - api
    volumes:
      - ./:/app
      - tara_runtime_data:/var/lib/tara
    networks:
      - tara-network
    restart: unless-stopped

  frontend:
    build:
      context: ../TARA - frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/backend}
        NEXT_PUBLIC_ENABLE_BOOTSTRAP_PAGE: ${NEXT_PUBLIC_ENABLE_BOOTSTRAP_PAGE:-false}
        API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api:8000}
    container_name: tara-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/backend}
      NEXT_PUBLIC_ENABLE_BOOTSTRAP_PAGE: ${NEXT_PUBLIC_ENABLE_BOOTSTRAP_PAGE:-false}
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api:8000}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - tara-network
    restart: unless-stopped

networks:
  tara-network:
    driver: bridge

volumes:
  postgres_data:
  tara_runtime_data:
