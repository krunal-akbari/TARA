services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./:/app

  worker:
    build: .
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info --concurrency=4 -Q resume_ingest,routing_events,notifications
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./:/app

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: tara
      POSTGRES_USER: tara
      POSTGRES_PASSWORD: tara
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
