name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]
      - name: Lint
        run: ruff check .
      - name: Type Check
        run: mypy app
      - name: Tests
        run: pytest
      - name: Alembic Check
        run: alembic upgrade head
